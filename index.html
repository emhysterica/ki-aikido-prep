<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ki Aikido — 3rd Kyu Prep</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#1a1a2e" />
<style>
body {
  margin: 0;
  font-family: system-ui, sans-serif;
  background: #1a1a2e;
  color: #fff;
  padding: 20px;
}
h1, h2 { margin-bottom: 8px; }
button {
  padding: 10px 16px;
  margin: 6px 4px;
  border-radius: 8px;
  border: none;
  font-size: 16px;
  cursor: pointer;
}
.primary { background: #d4a017; color: #000; }
.secondary { background: #333; color: #fff; }
.card {
  background: #222;
  padding: 16px;
  border-radius: 12px;
  margin-bottom: 20px;
}
.hidden { display: none; }
.small { font-size: 14px; opacity: 0.8; }
</style>
</head>
<body>

<h1>Ki Aikido — 3rd Kyu Prep</h1>

<!-- ===================== QUIZ ===================== -->
<div class="card">
<h2>Kumiwaza Quiz</h2>
<p id="techniqueName"></p>
<p id="description" class="hidden"></p>

<button class="secondary" onclick="reveal()">Show Description</button>
<button class="primary" onclick="mark(true)">Got it</button>
<button class="secondary" onclick="mark(false)">Didn't know</button>

<p class="small">Score: <span id="score"></span></p>
</div>

<!-- ===================== JIYU ===================== -->
<div class="card">
<h2>Jiyu Recall Mode</h2>
<button class="primary" onclick="startJiyu()">Start Random Attack</button>
<p id="jiyuPrompt"></p>
</div>

<!-- ===================== VOCAB ===================== -->
<div class="card">
<h2>Vocabulary</h2>
<button class="primary" onclick="vocabNormal()">Term → Meaning</button>
<button class="secondary" onclick="vocabReverse()">Meaning → Term</button>
<p id="vocabPrompt"></p>
</div>

<!-- ===================== WEAPONS ===================== -->
<div class="card">
<h2>Weapons Trainer</h2>
<button class="primary" onclick="testHappo()">Test Happo Giri</button>
<button class="secondary" onclick="testJo()">Test Jo 1</button>
<p id="weaponsPrompt"></p>
</div>

<script>
// ===================== DATA =====================

const techniques = [
  { name: "Iriminage", description: "Entering throw blending forward energy." },
  { name: "Kokyunage", description: "Breath throw emphasizing extension of ki." },
  { name: "Shihonage", description: "Four-direction throw controlling the arm." },
  { name: "Koteoroshi", description: "Wrist drop throw with downward extension." }
];

const vocab = [
  { term: "Zanshin", definition: "Remaining mind / continued awareness after technique." },
  { term: "Irimi", definition: "Entering movement." },
  { term: "Tenkan", definition: "Turning movement." }
];

const attacks = [
  "Yokomenuchi",
  "Katatetori",
  "Ushirotekubitori",
  "Tantotori"
];

const happo = [
  "Front",
  "Right",
  "Rear",
  "Left",
  "Front Diagonal Right",
  "Rear Diagonal Right",
  "Rear Diagonal Left",
  "Front Diagonal Left"
];

const jo1 = [
  "Strike",
  "Thrust",
  "Turn and Strike",
  "Rear Strike",
  "Forward Thrust"
];

// ===================== SPACED REP =====================

let stats = JSON.parse(localStorage.getItem("stats")) || {};
let total = 0;
let correct = 0;

function weightedRandom() {
  let weighted = [];
  techniques.forEach(t => {
    let s = stats[t.name];
    let weight = s ? (1 + s.wrong * 2) : 1;
    for (let i = 0; i < weight; i++) {
      weighted.push(t);
    }
  });
  return weighted[Math.floor(Math.random() * weighted.length)];
}

let current = weightedRandom();
displayTechnique();

function displayTechnique() {
  document.getElementById("description").classList.add("hidden");
  document.getElementById("techniqueName").textContent = current.name;
  speak(current.name);
}

function reveal() {
  document.getElementById("description").textContent = current.description;
  document.getElementById("description").classList.remove("hidden");
}

function mark(knewIt) {
  if (!stats[current.name]) {
    stats[current.name] = { correct: 0, wrong: 0 };
  }

  if (knewIt) {
    stats[current.name].correct++;
    correct++;
  } else {
    stats[current.name].wrong++;
  }

  total++;
  localStorage.setItem("stats", JSON.stringify(stats));
  document.getElementById("score").textContent = `${correct} / ${total}`;

  current = weightedRandom();
  displayTechnique();
}

// ===================== AUDIO =====================

function speak(text) {
  const utterance = new SpeechSynthesisUtterance(text);
  speechSynthesis.speak(utterance);
}

// ===================== JIYU =====================

function startJiyu() {
  const attack = attacks[Math.floor(Math.random() * attacks.length)];
  document.getElementById("jiyuPrompt").textContent =
    `Attack: ${attack} — mentally run your 5 throws.`;
}

// ===================== VOCAB =====================

function vocabNormal() {
  const item = vocab[Math.floor(Math.random() * vocab.length)];
  document.getElementById("vocabPrompt").textContent =
    `${item.term} — What does it mean?`;
}

function vocabReverse() {
  const item = vocab[Math.floor(Math.random() * vocab.length)];
  document.getElementById("vocabPrompt").textContent =
    `${item.definition} — What is the term?`;
}

// ===================== WEAPONS =====================

function testHappo() {
  const index = Math.floor(Math.random() * happo.length);
  document.getElementById("weaponsPrompt").textContent =
    `Cut #${index + 1} — What direction?`;
}

function testJo() {
  const index = Math.floor(Math.random() * jo1.length);
  document.getElementById("weaponsPrompt").textContent =
    `Jo 1 Move #${index + 1} — What action?`;
}

// ===================== REGISTER SERVICE WORKER =====================

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
